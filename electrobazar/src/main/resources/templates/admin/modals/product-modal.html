<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="modal">

    <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productmodalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productmodalLabel" th:text="#{admin.product.modal.title}">Producto
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm" novalidate>
                        <input type="hidden" id="productId">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label" for="productName"
                                    th:text="#{admin.common.name_required}">Nombre *</label>
                                <input type="text" class="form-control" id="productName" required
                                    th:placeholder="#{admin.product.placeholder.name}">
                            </div>

                            <div class="col-12">
                                <label class="form-label" for="productDescription"
                                    th:text="#{common.description}">Descripción</label>
                                <textarea class="form-control" id="productDescription" rows="2"
                                    placeholder="..."></textarea>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="productPrice"
                                    th:text="#{admin.common.price_required}">Precio () *</label>
                                <input type="number" class="form-control" id="productPrice" step="0.0001" min="0"
                                    required placeholder="0.0000">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="productIvaRate" th:text="#{common.iva}">IVA</label>
                                <select class="form-select" id="productIvaRate">
                                    <option value="" th:text="#{common.loading}">Cargando...</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="productStock">Stock</label>
                                <input type="number" class="form-control" id="productStock" min="0" placeholder="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="productCategory"
                                    th:text="#{admin.inventory.tabs.categories}">Categoria</label>
                                <select class="form-select" id="productCategory">
                                    <option value="" th:text="#{admin.common.nocategory}">— Sin categoria —</option>
                                    <option th:each="c : ${allCategories}" th:value="${c.id}" th:text="${c.name}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="productMeasurementUnit">unidad de Medida</label>
                                <select class="form-select" id="productMeasurementUnit">
                                    <option value="">— Sin unidades —</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="productImageUrl" th:text="#{admin.product.imageUrl}">URL
                                    de imagen (Cloudinary)</label>
                                <input type="url" class="form-control" id="productImageUrl"
                                    placeholder="https://res.cloudinary.com/..." oninput="previewImage(this.value)">
                                <img id="imgPreview" src="" th:alt="#{common.preview}">
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="productActive" checked>
                                    <label class="form-check-label" for="productActive"
                                        th:text="#{admin.product.active}">Producto activo</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" data-bs-dismiss="modal"
                        th:text="#{common.cancel}">Cancelar</button>
                    <button type="button" class="btn-save" onclick="saveProduct()"><i
                            class="bi bi-check-lg me-1"></i><span th:text="#{common.save}">Guardar</span></button>
                </div>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
