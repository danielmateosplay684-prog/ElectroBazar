<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="modal">

    <div class="modal fade" id="workerModal" tabindex="-1" aria-labelledby="workermodalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="workermodalLabel" th:text="#{admin.worker.modal.title}">Trabajador
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="workerForm" novalidate>
                        <input type="hidden" id="workerId">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label" th:text="#{admin.common.username_required}">Nombre de
                                    usuario *</label>
                                <input type="text" class="form-control" id="workerUsername" required
                                    th:placeholder="#{admin.worker.placeholder.username}">
                            </div>
                            <div class="col-12">
                                <label class="form-label" id="workerPasswordLabel"
                                    th:text="#{admin.common.password_required}">Contraseña *</label>
                                <input type="text" class="form-control" id="workerPassword" required
                                    placeholder="">
                                <small style="color: var(--text-muted);" th:text="#{admin.worker.password_info}">Se
                                    muestra en texto plano para gestión del
                                    dueño.</small>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="workerActive" checked>
                                    <label class="form-check-label" for="workerActive"
                                        th:text="#{admin.worker.active}">Trabajador activo</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label" th:text="#{admin.common.role}">Rol</label>
                                <select class="form-select" id="workerRole" onchange="onWorkerRoleChange()">
                                    <option value="" th:text="#{admin.workers.norole}">Sin rol</option>
                                </select>
                                <small style="color: var(--text-muted);" th:text="#{admin.worker.role_info}">Las
                                    tareas y permisos se heredian
                                    automáticamente del rol asignado.</small>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal" style="flex:1"
                        th:text="#{common.cancel}">Cancelar</button>
                    <button type="button" class="btn btn-save" onclick="saveWorker()" style="flex:1"
                        th:text="#{common.save}">Guardar</button>
                </div>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
