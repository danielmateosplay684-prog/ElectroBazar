<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Preferencias - ' + ${companySettings.appName}">Preferencias - ElectroBazar</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <th:block th:replace="~{fragments/theme :: themeScript}" />
    <link rel="stylesheet" th:href="@{/css/tpv/tpv-preferences.css}">
</head>

<body>
    <!-- Flash overlay for theme transitions -->
    <div class="theme-flash" id="themeFlash"></div>

    <div class="prefs-container">
        <div class="prefs-top">
            <a href="/tpv" class="btn-back">
                <i class="bi bi-arrow-left"></i> Volver al TPV
            </a>
            <div class="prefs-title"><i class="bi bi-palette2"></i> Preferencias</div>
        </div>

        <!-- Modo oscuro / claro -->
        <div class="pref-card">
            <div class="pref-label">Apariencia</div>
            <div class="mode-toggle" id="modeToggle">
                <div class="mode-option" data-mode="dark" id="modeDark">
                    <i class="bi bi-moon-stars-fill"></i> Oscuro
                </div>
                <div class="mode-option" data-mode="light" id="modeLight">
                    <i class="bi bi-sun-fill"></i> Claro
                </div>
            </div>
        </div>

        <!-- Tamaño de letra -->
        <div class="pref-card">
            <div class="pref-label">Tamaño de letra</div>
            <div class="option-selector" id="sizeSelector">
                <div class="select-option size-small" data-size="14px">Pequeño</div>
                <div class="select-option size-normal" data-size="16px">Normal</div>
                <div class="select-option size-large" data-size="18px">Grande</div>
                <div class="select-option size-xl" data-size="20px">Extra</div>
            </div>
        </div>

        <!-- Tipo de letra -->
        <div class="pref-card">
            <div class="pref-label">Tipo de letra</div>
            <div class="option-selector" id="fontSelector">
                <div class="select-option font-barlow" data-font="'Barlow', sans-serif">Barlow</div>
                <div class="select-option font-montserrat" data-font="'Montserrat', sans-serif">Moderno</div>
                <div class="select-option font-playfair" data-font="'Playfair Display', serif">Clásico</div>
                <div class="select-option font-quicksand" data-font="'Quicksand', sans-serif">Rounded</div>
            </div>
        </div>

        <!-- Color de acento -->
        <div class="pref-card">
            <div class="pref-label">Color de acento</div>
            <div class="swatch-grid" id="accentSwatches"></div>
        </div>

        <!-- Tono de fondo -->
        <div class="pref-card">
            <div class="pref-label">Tono de fondo</div>
            <div class="primary-list" id="primarySwatches"></div>
        </div>
    </div>

    <script th:src="@{/js/tpv/tpv-preferences.js}"></script>
</body>

</html>
